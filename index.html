<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            color: #eee;
        }
        .container { text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #e94560; }
        .status {
            font-size: 1.3rem;
            margin-bottom: 20px;
            min-height: 2rem;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .cell {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell:hover { background: #1a2a50; transform: scale(1.05); }
        .cell.x { color: #e94560; }
        .cell.o { color: #0ea5e9; }
        .cell.win { background: #0f3460; animation: pulse 0.6s ease-in-out infinite alternate; }
        @keyframes pulse { to { transform: scale(1.1); } }
        .btn {
            padding: 12px 32px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e94560;
            color: #fff;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background: #c73652; }
        .score {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .score span { font-weight: bold; }
        .score .x-score { color: #e94560; }
        .score .o-score { color: #0ea5e9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="score">
            <div>X: <span class="x-score" id="xScore">0</span></div>
            <div>Draws: <span id="draws">0</span></div>
            <div>O: <span class="o-score" id="oScore">0</span></div>
        </div>
        <div class="status" id="status">X's turn</div>
        <div class="board" id="board"></div>
        <button class="btn" onclick="resetGame()">New Game</button>
    </div>
    <script>
        const board = document.getElementById('board');
        const status = document.getElementById('status');
        let cells = Array(9).fill('');
        let currentPlayer = 'X';
        let gameOver = false;
        let scores = { X: 0, O: 0, draws: 0 };

        const winCombos = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        function render() {
            board.innerHTML = '';
            cells.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell' + (val ? ' ' + val.toLowerCase() : '');
                cell.textContent = val;
                cell.addEventListener('click', () => makeMove(i));
                board.appendChild(cell);
            });
        }

        function makeMove(i) {
            if (cells[i] || gameOver) return;
            cells[i] = currentPlayer;
            const winner = checkWinner();
            if (winner) {
                gameOver = true;
                status.textContent = `${winner} wins!`;
                scores[winner]++;
                updateScores();
                highlightWin(winner);
                return;
            }
            if (cells.every(c => c)) {
                gameOver = true;
                status.textContent = "It's a draw!";
                scores.draws++;
                updateScores();
                render();
                return;
            }
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            status.textContent = `${currentPlayer}'s turn`;
            render();
        }

        function checkWinner() {
            for (const combo of winCombos) {
                const [a, b, c] = combo;
                if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
                    return cells[a];
                }
            }
            return null;
        }

        function highlightWin(winner) {
            render();
            for (const combo of winCombos) {
                const [a, b, c] = combo;
                if (cells[a] === winner && cells[b] === winner && cells[c] === winner) {
                    const allCells = board.querySelectorAll('.cell');
                    allCells[a].classList.add('win');
                    allCells[b].classList.add('win');
                    allCells[c].classList.add('win');
                }
            }
        }

        function updateScores() {
            document.getElementById('xScore').textContent = scores.X;
            document.getElementById('oScore').textContent = scores.O;
            document.getElementById('draws').textContent = scores.draws;
        }

        function resetGame() {
            cells = Array(9).fill('');
            currentPlayer = 'X';
            gameOver = false;
            status.textContent = "X's turn";
            render();
        }

        render();
    </script>
</body>
</html>
