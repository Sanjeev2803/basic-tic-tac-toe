<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f1a;
            color: #eee;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px 12px;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        h1 {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            background: linear-gradient(135deg, #e94560, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        /* Particle background */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* Settings panel */
        .settings {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            width: 100%;
        }
        .color-pick {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .color-pick input[type="color"] {
            width: 32px; height: 32px;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            padding: 2px;
        }
        .mode-toggle {
            display: flex;
            gap: 3px;
            background: #1a1a2e;
            border-radius: 8px;
            padding: 3px;
        }
        .mode-btn {
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #888;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: #e94560;
            color: #fff;
        }
        .difficulty {
            display: flex;
            gap: 3px;
            background: #1a1a2e;
            border-radius: 8px;
            padding: 3px;
            justify-content: center;
        }
        .diff-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #888;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .diff-btn.active {
            background: #0ea5e9;
            color: #fff;
        }

        .score {
            display: flex;
            justify-content: center;
            gap: clamp(20px, 6vw, 40px);
            font-size: clamp(0.95rem, 3vw, 1.2rem);
        }
        .score span { font-weight: bold; }

        .status {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            min-height: 1.8rem;
            font-weight: 600;
            transition: color 0.3s;
        }

        /* Board — responsive cells using vmin */
        .board-wrapper {
            position: relative;
            display: inline-block;
        }
        .board {
            --cell-size: min(110px, calc((100vw - 60px) / 3));
            display: grid;
            grid-template-columns: repeat(3, var(--cell-size));
            grid-template-rows: repeat(3, var(--cell-size));
            gap: clamp(6px, 1.5vw, 10px);
            justify-content: center;
            perspective: 800px;
        }
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid #0f3460;
            border-radius: clamp(10px, 2.5vw, 16px);
            font-size: clamp(2rem, 7vw, 3.2rem);
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        .cell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.08), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cell:hover::before { opacity: 1; }
        .cell:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border-color: #1a4a80;
        }
        .cell.disabled { cursor: default; pointer-events: none; }

        /* Placement animation */
        .cell .mark {
            display: inline-block;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            60% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            0% { transform: scale(0); opacity: 0.6; }
            100% { transform: scale(4); opacity: 0; }
        }

        /* Win animation */
        .cell.win {
            animation: winPulse 0.8s ease-in-out infinite alternate;
            box-shadow: 0 0 30px var(--glow-color, #e94560);
            border-color: var(--glow-color, #e94560);
        }
        @keyframes winPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08) rotate(2deg); }
            100% { transform: scale(1.12) rotate(-2deg); }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            top: -10px;
            animation: confettiFall linear forwards;
            z-index: 100;
            pointer-events: none;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .btn {
            padding: clamp(10px, 2.5vw, 14px) clamp(24px, 7vw, 36px);
            font-size: clamp(0.95rem, 3vw, 1.1rem);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #e94560, #c73652);
            color: #fff;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
            margin-top: 8px;
            flex-shrink: 0;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }
        .btn:active { transform: translateY(0); }

        /* Screen shake on win */
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-1deg); }
            40% { transform: translateX(8px) rotate(1deg); }
            60% { transform: translateX(-6px) rotate(-0.5deg); }
            80% { transform: translateX(6px) rotate(0.5deg); }
        }

        /* Draw animation */
        .draw-shake { animation: drawShake 0.6s ease-in-out; }
        @keyframes drawShake {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        /* Small phones */
        @media (max-width: 360px) {
            .board { --cell-size: calc((100vw - 50px) / 3); }
            .settings { gap: 8px; }
            .mode-btn { padding: 6px 10px; font-size: 0.8rem; }
            .diff-btn { padding: 5px 9px; font-size: 0.75rem; }
        }

        /* Tablets and larger */
        @media (min-width: 768px) {
            .board { --cell-size: 130px; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <h1>Tic Tac Toe</h1>

        <div class="settings">
            <div class="color-pick">
                <label>X:</label>
                <input type="color" id="xColor" value="#e94560">
            </div>
            <div class="mode-toggle">
                <button class="mode-btn active" onclick="setMode('ai')">vs AI</button>
                <button class="mode-btn" onclick="setMode('pvp')">2 Player</button>
            </div>
            <div class="color-pick">
                <label>O:</label>
                <input type="color" id="oColor" value="#0ea5e9">
            </div>
        </div>

        <div class="difficulty" id="difficultyPanel">
            <button class="diff-btn" onclick="setDifficulty('easy')">Easy</button>
            <button class="diff-btn active" onclick="setDifficulty('medium')">Medium</button>
            <button class="diff-btn" onclick="setDifficulty('hard')">Hard</button>
        </div>

        <div class="mode-toggle" id="sidePanel">
            <button class="mode-btn active" onclick="setSide('X')">Play as X</button>
            <button class="mode-btn" onclick="setSide('O')">Play as O</button>
        </div>

        <div class="score">
            <div>X: <span id="xScore">0</span></div>
            <div>Draws: <span id="draws">0</span></div>
            <div>O: <span id="oScore">0</span></div>
        </div>

        <div class="status" id="status">Your turn (X)</div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>

        <button class="btn" onclick="resetGame()">New Game</button>
    </div>

    <script>
        // --- Audio (Web Audio API - no files needed) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.15;

            if (type === 'place') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'win') {
                osc.type = 'square';
                const t = audioCtx.currentTime;
                osc.frequency.setValueAtTime(523, t);
                osc.frequency.setValueAtTime(659, t + 0.15);
                osc.frequency.setValueAtTime(784, t + 0.3);
                osc.frequency.setValueAtTime(1047, t + 0.45);
                gain.gain.setValueAtTime(0.12, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
                osc.start(); osc.stop(t + 0.7);
            } else if (type === 'draw') {
                osc.type = 'triangle';
                const t = audioCtx.currentTime;
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(200, t + 0.4);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
                osc.start(); osc.stop(t + 0.4);
            } else if (type === 'hover') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.value = 0.03;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
        }

        // --- State ---
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        let cells = Array(9).fill('');
        let currentPlayer = 'X';
        let gameOver = false;
        let scores = { X: 0, O: 0, draws: 0 };
        let mode = 'ai';
        let difficulty = 'medium';
        let aiThinking = false;
        let humanSide = 'X';
        let aiSide = 'O';

        const winCombos = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        // --- Colors ---
        const xColorInput = document.getElementById('xColor');
        const oColorInput = document.getElementById('oColor');

        function getXColor() { return xColorInput.value; }
        function getOColor() { return oColorInput.value; }

        xColorInput.addEventListener('input', () => { render(); updateScoreColors(); });
        oColorInput.addEventListener('input', () => { render(); updateScoreColors(); });

        function updateScoreColors() {
            document.getElementById('xScore').style.color = getXColor();
            document.getElementById('oScore').style.color = getOColor();
        }

        // --- Mode & Difficulty ---
        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-toggle .mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.mode-toggle .mode-btn[onclick="setMode('${m}')"]`).classList.add('active');
            document.getElementById('difficultyPanel').style.display = m === 'ai' ? 'flex' : 'none';
            document.getElementById('sidePanel').style.display = m === 'ai' ? 'flex' : 'none';
            resetGame();
        }

        function setSide(s) {
            humanSide = s;
            aiSide = s === 'X' ? 'O' : 'X';
            document.querySelectorAll('#sidePanel .mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`#sidePanel .mode-btn[onclick="setSide('${s}')"]`).classList.add('active');
            resetGame();
        }

        function setDifficulty(d) {
            difficulty = d;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.diff-btn[onclick="setDifficulty('${d}')"]`).classList.add('active');
            resetGame();
        }

        // --- Particles ---
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.background = Math.random() > 0.5 ? '#e94560' : '#0ea5e9';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // --- Confetti ---
        function spawnConfetti() {
            const colors = [getXColor(), getOColor(), '#ffd700', '#ff6b6b', '#48dbfb', '#ff9ff3', '#54a0ff'];
            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.width = (Math.random() * 10 + 5) + 'px';
                c.style.height = (Math.random() * 10 + 5) + 'px';
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                c.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                c.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        // --- Render ---
        function render() {
            boardEl.innerHTML = '';
            cells.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (val) {
                    const mark = document.createElement('span');
                    mark.className = 'mark';
                    mark.textContent = val;
                    mark.style.color = val === 'X' ? getXColor() : getOColor();
                    mark.style.textShadow = `0 0 20px ${val === 'X' ? getXColor() : getOColor()}`;
                    cell.appendChild(mark);
                }
                if (gameOver || aiThinking) cell.classList.add('disabled');

                cell.addEventListener('mousemove', e => {
                    const rect = cell.getBoundingClientRect();
                    cell.style.setProperty('--mx', ((e.clientX - rect.left) / rect.width * 100) + '%');
                    cell.style.setProperty('--my', ((e.clientY - rect.top) / rect.height * 100) + '%');
                });
                cell.addEventListener('mouseenter', () => { if (!val && !gameOver && !aiThinking) playSound('hover'); });
                cell.addEventListener('click', () => makeMove(i));
                boardEl.appendChild(cell);
            });
            updateScoreColors();
        }

        // --- Ripple ---
        function createRipple(cellEl, color) {
            const size = cellEl.offsetWidth * 0.5;
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = (cellEl.offsetWidth / 2 - size / 2) + 'px';
            ripple.style.top = (cellEl.offsetHeight / 2 - size / 2) + 'px';
            ripple.style.background = color;
            cellEl.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // --- Move ---
        function makeMove(i) {
            if (cells[i] || gameOver || aiThinking) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            cells[i] = currentPlayer;
            playSound('place');
            render();

            const cellEl = boardEl.children[i];
            createRipple(cellEl, currentPlayer === 'X' ? getXColor() : getOColor());

            const winner = checkWinner();
            if (winner) {
                gameOver = true;
                playSound('win');
                const label = (mode === 'ai' && winner === humanSide) ? 'You win!' :
                              (mode === 'ai' && winner === aiSide) ? 'AI wins!' :
                              `${winner} wins!`;
                statusEl.textContent = label;
                statusEl.style.color = winner === 'X' ? getXColor() : getOColor();
                scores[winner]++;
                updateScores();
                highlightWin(winner);
                spawnConfetti();
                document.querySelector('.container').classList.add('shake');
                setTimeout(() => document.querySelector('.container').classList.remove('shake'), 500);
                return;
            }
            if (cells.every(c => c)) {
                gameOver = true;
                playSound('draw');
                statusEl.textContent = "It's a draw!";
                statusEl.style.color = '#ffd700';
                scores.draws++;
                updateScores();
                document.querySelector('.board-wrapper').classList.add('draw-shake');
                setTimeout(() => document.querySelector('.board-wrapper').classList.remove('draw-shake'), 600);
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateStatus();

            if (mode === 'ai' && currentPlayer === aiSide && !gameOver) {
                aiThinking = true;
                render();
                const delay = Math.floor(Math.random() * 1000) + 2000;
                setTimeout(() => {
                    aiThinking = false;
                    aiMove();
                }, delay);
            }
        }

        function updateStatus() {
            if (mode === 'ai') {
                statusEl.textContent = currentPlayer === humanSide ? `Your turn (${humanSide})` : 'AI thinking...';
            } else {
                statusEl.textContent = `${currentPlayer}'s turn`;
            }
            statusEl.style.color = currentPlayer === 'X' ? getXColor() : getOColor();
        }

        // --- AI ---
        function aiMove() {
            let move;
            if (difficulty === 'easy') {
                move = aiEasy();
            } else if (difficulty === 'medium') {
                move = Math.random() < 0.6 ? aiBest() : aiEasy();
            } else {
                move = aiBest();
            }
            if (move !== undefined) makeMove(move);
        }

        function aiEasy() {
            const empty = cells.map((v, i) => v === '' ? i : -1).filter(i => i >= 0);
            return empty[Math.floor(Math.random() * empty.length)];
        }

        function aiBest() {
            let bestScore = -Infinity;
            let bestMove;
            for (let i = 0; i < 9; i++) {
                if (cells[i] !== '') continue;
                cells[i] = aiSide;
                const score = minimax(cells, 0, false);
                cells[i] = '';
                if (score > bestScore) { bestScore = score; bestMove = i; }
            }
            return bestMove;
        }

        function minimax(board, depth, isMaximizing) {
            const winner = checkWinner();
            if (winner === aiSide) return 10 - depth;
            if (winner === humanSide) return depth - 10;
            if (board.every(c => c)) return 0;

            if (isMaximizing) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] !== '') continue;
                    board[i] = aiSide;
                    best = Math.max(best, minimax(board, depth + 1, false));
                    board[i] = '';
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] !== '') continue;
                    board[i] = humanSide;
                    best = Math.min(best, minimax(board, depth + 1, true));
                    board[i] = '';
                }
                return best;
            }
        }

        function checkWinner() {
            for (const [a, b, c] of winCombos) {
                if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) return cells[a];
            }
            return null;
        }

        function highlightWin(winner) {
            const color = winner === 'X' ? getXColor() : getOColor();
            const allCells = boardEl.querySelectorAll('.cell');
            for (const [a, b, c] of winCombos) {
                if (cells[a] === winner && cells[b] === winner && cells[c] === winner) {
                    [a, b, c].forEach(idx => {
                        allCells[idx].classList.add('win');
                        allCells[idx].style.setProperty('--glow-color', color);
                    });
                }
            }
        }

        function updateScores() {
            document.getElementById('xScore').textContent = scores.X;
            document.getElementById('oScore').textContent = scores.O;
            document.getElementById('draws').textContent = scores.draws;
        }

        function resetGame() {
            cells = Array(9).fill('');
            currentPlayer = 'X';
            gameOver = false;
            aiThinking = false;
            updateStatus();
            render();

            // If human plays O, AI goes first as X
            if (mode === 'ai' && humanSide === 'O') {
                aiThinking = true;
                render();
                const delay = Math.floor(Math.random() * 1000) + 2000;
                setTimeout(() => {
                    aiThinking = false;
                    aiMove();
                }, delay);
            }
        }

        render();
        updateScoreColors();
    </script>
</body>
</html>
