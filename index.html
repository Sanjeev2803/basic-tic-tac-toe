<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Royal Duel - Medieval Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; min-height: 100vh; min-height: 100dvh; }
        body {
            font-family: 'Cinzel', serif;
            display: flex; justify-content: center; align-items: center;
            background: #1a0f0a;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(139,69,19,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(139,69,19,0.1) 0%, transparent 50%);
            color: #d4a558; overflow-x: hidden; overflow-y: auto; padding: 20px 12px;
        }
        .embers { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .ember { position: absolute; border-radius: 50%; animation: emberRise linear infinite; }
        @keyframes emberRise {
            0% { transform: translateY(100vh) scale(1); opacity: 0; }
            10% { opacity: 0.8; } 50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(0); opacity: 0; }
        }
        .container {
            text-align: center; position: relative; z-index: 1;
            width: 100%; max-width: 520px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .banner { position: relative; padding: 12px 40px; margin-bottom: 4px; }
        .banner h1 {
            font-family: 'MedievalSharp', cursive; font-size: clamp(2rem, 7vw, 3rem);
            color: #f0c65a; text-shadow: 0 0 20px rgba(240,198,90,0.4), 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 3px;
        }
        .banner .subtitle {
            font-family: 'Cinzel', serif; font-size: clamp(0.65rem, 2vw, 0.8rem);
            color: #8b7355; letter-spacing: 6px; text-transform: uppercase; margin-top: 2px;
        }
        .divider {
            width: 80%; max-width: 300px; height: 2px;
            background: linear-gradient(90deg, transparent, #8b6914, #f0c65a, #8b6914, transparent);
            margin: 2px auto;
        }
        .controls {
            background: linear-gradient(180deg, rgba(30,18,10,0.95), rgba(45,28,15,0.9));
            border: 1px solid #5a3a1a; border-radius: 12px; padding: 14px 16px; width: 100%;
            display: flex; flex-direction: column; gap: 10px;
            box-shadow: inset 0 1px 0 rgba(240,198,90,0.1), 0 4px 20px rgba(0,0,0,0.5);
        }
        .control-row {
            display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .toggle-group {
            display: flex; gap: 2px; background: rgba(0,0,0,0.4);
            border: 1px solid #3a2510; border-radius: 8px; padding: 3px;
        }
        .toggle-btn {
            padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer;
            background: transparent; color: #6b5a40; font-family: 'Cinzel', serif;
            font-size: 0.75rem; font-weight: 700; transition: all 0.3s; white-space: nowrap;
        }
        .toggle-btn.active {
            background: linear-gradient(180deg, #8b6914, #6b4f10);
            color: #f0c65a; box-shadow: 0 0 10px rgba(240,198,90,0.2);
        }
        .toggle-btn:hover:not(.active) { color: #a08050; }
        .color-pick { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: #8b7355; }
        .color-pick input[type="color"] {
            width: 28px; height: 28px; border: 2px solid #5a3a1a;
            border-radius: 6px; cursor: pointer; background: transparent; padding: 1px;
        }

        /* Panels */
        .panel {
            background: linear-gradient(180deg, rgba(30,18,10,0.95), rgba(45,28,15,0.9));
            border: 1px solid #5a3a1a; border-radius: 12px; padding: 14px 16px; width: 100%;
            display: none; flex-direction: column; gap: 10px; align-items: center;
            box-shadow: inset 0 1px 0 rgba(240,198,90,0.1), 0 4px 20px rgba(0,0,0,0.5);
        }
        .panel.show { display: flex; }
        .panel .label { font-family: 'MedievalSharp', cursive; font-size: 1rem; color: #f0c65a; }
        .panel input[type="text"] {
            background: rgba(0,0,0,0.5); border: 1px solid #5a3a1a; border-radius: 6px;
            padding: 8px 14px; color: #f0c65a; font-family: 'Cinzel', serif; font-size: 0.9rem;
            text-align: center; width: 220px; letter-spacing: 2px; outline: none;
        }
        .panel input[type="text"]::placeholder { color: #5a4a30; }
        .panel input[type="text"]:focus { border-color: #8b6914; }
        .code-display {
            font-family: 'MedievalSharp', cursive; font-size: 1.6rem; color: #f0c65a;
            letter-spacing: 6px; padding: 8px 20px;
            background: rgba(0,0,0,0.4); border: 1px solid #8b6914;
            border-radius: 8px; cursor: pointer; transition: all 0.3s;
        }
        .code-display:hover { box-shadow: 0 0 15px rgba(240,198,90,0.2); }
        .hint { font-size: 0.7rem; color: #6b5a40; font-style: italic; }
        .medieval-btn {
            padding: 8px 20px; border: 1px solid #8b6914; border-radius: 6px; cursor: pointer;
            background: linear-gradient(180deg, #5a3a1a, #3a2510); color: #f0c65a;
            font-family: 'Cinzel', serif; font-size: 0.8rem; font-weight: 700;
            transition: all 0.3s; letter-spacing: 1px;
        }
        .medieval-btn:hover { background: linear-gradient(180deg, #6b4520, #4a3018); border-color: #f0c65a; }
        .medieval-btn:disabled { opacity: 0.4; cursor: default; }
        .connected-badge {
            display: inline-block; padding: 4px 12px;
            background: rgba(46,125,50,0.3); border: 1px solid #4caf50;
            border-radius: 20px; color: #81c784; font-size: 0.75rem; letter-spacing: 1px;
        }

        /* Player names bar */
        .players-bar {
            display: none; justify-content: center; gap: 20px; align-items: center;
            font-size: 0.85rem; width: 100%;
        }
        .players-bar.show { display: flex; }
        .players-bar .player {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 8px;
            background: rgba(0,0,0,0.3); border: 1px solid #3a2510;
        }
        .players-bar .player.active-player {
            border-color: #f0c65a; box-shadow: 0 0 10px rgba(240,198,90,0.2);
        }
        .players-bar .vs { color: #6b5a40; font-family: 'MedievalSharp', cursive; font-size: 1rem; }

        /* Coin toss overlay */
        .coin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 5, 3, 0.92); z-index: 200;
            display: none; justify-content: center; align-items: center;
            flex-direction: column; gap: 20px;
        }
        .coin-overlay.show { display: flex; }
        .coin-container { perspective: 600px; }
        .coin {
            width: 120px; height: 120px; position: relative;
            transform-style: preserve-3d; transition: transform 0.1s;
        }
        .coin.flipping { animation: coinFlip 2.5s ease-out forwards; }
        @keyframes coinFlip {
            0% { transform: rotateX(0deg) translateY(0); }
            15% { transform: rotateX(720deg) translateY(-150px); }
            30% { transform: rotateX(1440deg) translateY(-200px); }
            50% { transform: rotateX(2160deg) translateY(-120px); }
            70% { transform: rotateX(2880deg) translateY(-40px); }
            85% { transform: rotateX(3240deg) translateY(0px); }
            100% { transform: rotateX(var(--final-rotation)) translateY(0); }
        }
        .coin-face {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; backface-visibility: hidden;
            box-shadow: 0 0 30px rgba(240,198,90,0.3), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .coin-front {
            background: radial-gradient(circle at 40% 40%, #f0c65a, #8b6914);
            border: 4px solid #d4a558;
        }
        .coin-back {
            background: radial-gradient(circle at 40% 40%, #c0c0c0, #707070);
            border: 4px solid #a0a0a0;
            transform: rotateX(180deg);
        }
        .coin-result {
            font-family: 'MedievalSharp', cursive; font-size: 1.5rem; color: #f0c65a;
            text-shadow: 0 0 20px rgba(240,198,90,0.5);
            opacity: 0; transition: opacity 0.5s;
        }
        .coin-result.show { opacity: 1; }
        .coin-label {
            font-family: 'MedievalSharp', cursive; font-size: 1.2rem; color: #8b7355;
        }

        .scoreboard {
            display: flex; justify-content: center; gap: clamp(24px, 8vw, 50px);
            font-size: clamp(0.85rem, 2.8vw, 1rem); color: #8b7355;
        }
        .scoreboard .player-score { display: flex; flex-direction: column; align-items: center; }
        .scoreboard .score-icon { font-size: 1.4rem; }
        .scoreboard .score-val { font-weight: 900; font-size: 1.3rem; }
        .status {
            font-family: 'MedievalSharp', cursive; font-size: clamp(1.1rem, 4vw, 1.5rem);
            min-height: 2rem; transition: color 0.3s;
            text-shadow: 0 0 15px rgba(240,198,90,0.3);
        }
        .board-wrapper {
            position: relative; display: inline-block; padding: 16px;
            background: linear-gradient(145deg, rgba(60,40,20,0.9), rgba(40,25,12,0.95));
            border: 3px solid #5a3a1a; border-radius: 16px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.4), 0 0 80px rgba(139,105,20,0.1);
        }
        .board {
            --cell-size: min(105px, calc((100vw - 100px) / 3));
            display: grid; grid-template-columns: repeat(3, var(--cell-size));
            grid-template-rows: repeat(3, var(--cell-size));
            gap: clamp(6px, 1.5vw, 10px); justify-content: center;
        }
        .cell {
            width: var(--cell-size); height: var(--cell-size);
            background: linear-gradient(145deg, #2a1a0d, #1e120a);
            border: 2px solid #4a2e15; border-radius: 10px;
            font-size: clamp(2.2rem, 8vw, 3.4rem); cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; user-select: none;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }
        .cell::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(240,198,90,0.08), transparent 60%);
            opacity: 0; transition: opacity 0.3s;
        }
        .cell:hover::before { opacity: 1; }
        .cell:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.5), 0 0 15px rgba(240,198,90,0.1);
            border-color: #6b4f10;
        }
        .cell.disabled { cursor: default; pointer-events: none; }
        .cell .mark {
            display: inline-block; animation: swordStrike 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 8px var(--mark-color));
        }
        @keyframes swordStrike {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            50% { transform: scale(1.4) rotate(15deg); }
            70% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .ripple { position: absolute; border-radius: 50%; animation: rippleAnim 0.6s ease-out forwards; pointer-events: none; }
        @keyframes rippleAnim { 0% { transform: scale(0); opacity: 0.5; } 100% { transform: scale(4); opacity: 0; } }
        .cell.win { animation: winGlow 0.8s ease-in-out infinite alternate; border-color: var(--glow-color, #f0c65a) !important; }
        @keyframes winGlow {
            0% { transform: scale(1); box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 20px var(--glow-color, #f0c65a); }
            100% { transform: scale(1.08); box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 40px var(--glow-color, #f0c65a), 0 0 60px var(--glow-color, #f0c65a); }
        }
        .confetti { position: fixed; top: -10px; animation: confettiFall linear forwards; z-index: 100; pointer-events: none; }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(100vh) rotate(1080deg) scale(0.5); opacity: 0; }
        }
        .btn {
            padding: clamp(10px, 2.5vw, 14px) clamp(28px, 8vw, 44px);
            font-family: 'Cinzel', serif; font-size: clamp(0.85rem, 2.8vw, 1rem);
            font-weight: 700; border: 2px solid #8b6914; border-radius: 8px; cursor: pointer;
            background: linear-gradient(180deg, #5a3a1a, #3a2510); color: #f0c65a;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.4), inset 0 1px 0 rgba(240,198,90,0.2);
            letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.5), 0 0 20px rgba(240,198,90,0.15);
            background: linear-gradient(180deg, #6b4520, #4a3018); border-color: #f0c65a;
        }
        .btn:active { transform: translateY(0); }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-1deg); } 40% { transform: translateX(8px) rotate(1deg); }
            60% { transform: translateX(-6px) rotate(-0.5deg); } 80% { transform: translateX(6px) rotate(0.5deg); }
        }
        .draw-shake { animation: drawShake 0.6s ease-in-out; }
        @keyframes drawShake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
        @media (max-width: 360px) {
            .board { --cell-size: calc((100vw - 90px) / 3); }
            .toggle-btn { padding: 5px 10px; font-size: 0.7rem; }
            .controls { padding: 10px 10px; }
        }
        @media (min-width: 768px) { .board { --cell-size: 130px; } }
    </style>
</head>
<body>
    <div class="embers" id="embers"></div>

    <!-- Coin Toss Overlay -->
    <div class="coin-overlay" id="coinOverlay">
        <div class="coin-label">The Fates Decide...</div>
        <div class="coin-container">
            <div class="coin" id="coin">
                <div class="coin-face coin-front">&#9876;</div>
                <div class="coin-face coin-back">&#9781;</div>
            </div>
        </div>
        <div class="coin-result" id="coinResult"></div>
    </div>

    <div class="container">
        <div class="banner">
            <h1>Royal Duel</h1>
            <div class="subtitle">A Medieval Battle of Wits</div>
        </div>
        <div class="divider"></div>

        <div class="controls" id="controlsPanel">
            <div class="control-row">
                <div class="color-pick">
                    <label>Sword:</label>
                    <input type="color" id="xColor" value="#e94560">
                </div>
                <div class="toggle-group" id="modeToggle">
                    <button class="toggle-btn active" onclick="setMode('ai')">vs Dragon</button>
                    <button class="toggle-btn" onclick="setMode('local')">Local Duel</button>
                    <button class="toggle-btn" onclick="setMode('online')">Online Duel</button>
                </div>
                <div class="color-pick">
                    <label>Shield:</label>
                    <input type="color" id="oColor" value="#4da6ff">
                </div>
            </div>
            <div class="control-row" id="aiControls">
                <div class="toggle-group" id="difficultyPanel">
                    <button class="toggle-btn" onclick="setDifficulty('easy')">Squire</button>
                    <button class="toggle-btn active" onclick="setDifficulty('medium')">Knight</button>
                    <button class="toggle-btn" onclick="setDifficulty('hard')">King</button>
                </div>
            </div>
            <div class="control-row" id="aiControls2">
                <div class="toggle-group" id="sidePanel">
                    <button class="toggle-btn active" onclick="setSide('X')">Wield Sword</button>
                    <button class="toggle-btn" onclick="setSide('O')">Bear Shield</button>
                </div>
                <div class="toggle-group" id="firstPanel">
                    <button class="toggle-btn active" onclick="setFirstMove('human')">You First</button>
                    <button class="toggle-btn" onclick="setFirstMove('ai')">Dragon First</button>
                </div>
            </div>
        </div>

        <!-- Local Duel Panel -->
        <div class="panel" id="localPanel">
            <div class="label">Enter Thy Names</div>
            <div class="divider" style="width:60%;"></div>
            <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; align-items:center;">
                <div style="display:flex; flex-direction:column; gap:4px; align-items:center;">
                    <span style="font-size:0.7rem; color:#8b7355;">Warrior I</span>
                    <input type="text" id="localNameX" placeholder="Enter name" maxlength="12">
                </div>
                <span style="color:#6b5a40; font-family:'MedievalSharp',cursive; font-size:1.2rem;">vs</span>
                <div style="display:flex; flex-direction:column; gap:4px; align-items:center;">
                    <span style="font-size:0.7rem; color:#8b7355;">Warrior II</span>
                    <input type="text" id="localNameO" placeholder="Enter name" maxlength="12">
                </div>
            </div>
            <div class="hint">The coin toss shall decide thy fates</div>
            <button class="medieval-btn" onclick="startLocalDuel()">Begin Duel</button>
        </div>

        <!-- Online Duel Panel -->
        <div class="panel" id="onlinePanel">
            <div class="label">Summon an Ally for Battle</div>
            <div class="divider" style="width:60%;"></div>
            <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
                <span style="font-size:0.7rem; color:#8b7355;">Thy Name</span>
                <input type="text" id="onlineName" placeholder="Enter thy name" maxlength="12">
            </div>
            <div id="onlineStatus">
                <button class="medieval-btn" onclick="createRoom()" id="createBtn">Create Battle Room</button>
                <div style="margin:8px 0; color:#6b5a40; font-size:0.75rem;">- or -</div>
                <div style="display:flex; gap:8px; align-items:center; justify-content:center;">
                    <input type="text" id="joinCode" placeholder="Room code" maxlength="6" style="width:140px;">
                    <button class="medieval-btn" onclick="joinRoom()" id="joinBtn">Join</button>
                </div>
            </div>
            <div id="onlineConnected" style="display:none;">
                <div class="connected-badge" id="connectedBadge">Allied Knight Connected</div>
                <div class="hint" style="margin-top:6px;" id="onlineRole"></div>
            </div>
        </div>

        <!-- Player names bar -->
        <div class="players-bar" id="playersBar">
            <div class="player" id="playerXBar">
                <span>&#9876;</span>
                <span id="playerXName">Player 1</span>
            </div>
            <span class="vs">vs</span>
            <div class="player" id="playerOBar">
                <span>&#9781;</span>
                <span id="playerOName">Player 2</span>
            </div>
        </div>

        <div class="scoreboard">
            <div class="player-score">
                <span class="score-icon">&#9876;</span>
                <span class="score-val" id="xScore">0</span>
            </div>
            <div class="player-score">
                <span class="score-icon">&#9878;</span>
                <span class="score-val" id="draws" style="color:#8b7355;">0</span>
            </div>
            <div class="player-score">
                <span class="score-icon">&#9781;</span>
                <span class="score-val" id="oScore">0</span>
            </div>
        </div>

        <div class="status" id="status">Draw thy sword, warrior</div>

        <div class="board-wrapper" id="boardWrapper">
            <div class="board" id="board"></div>
        </div>

        <button class="btn" onclick="newGame()">New Battle</button>
    </div>

    <script>
        // --- Audio ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const t = audioCtx.currentTime;
            if (type === 'place') {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(200, t + 0.15);
                gain.gain.setValueAtTime(0.12, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
                const osc2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
                osc2.connect(g2); g2.connect(audioCtx.destination); osc2.type = 'square';
                osc2.frequency.setValueAtTime(150, t); g2.gain.setValueAtTime(0.06, t);
                g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08); osc2.start(t); osc2.stop(t + 0.08);
            } else if (type === 'win') {
                [392, 523, 659, 784, 1047].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, t + i * 0.12);
                    gain.gain.setValueAtTime(0.08, t + i * 0.12);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.25);
                    osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.25);
                });
            } else if (type === 'draw') {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
                osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(60, t + 0.5);
                gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                osc.start(t); osc.stop(t + 0.5);
            } else if (type === 'hover') {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
                osc.frequency.setValueAtTime(300, t); gain.gain.setValueAtTime(0.02, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06); osc.start(t); osc.stop(t + 0.06);
            } else if (type === 'coin') {
                // Coin spinning metallic sound
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'triangle';
                osc.frequency.setValueAtTime(2000, t); osc.frequency.exponentialRampToValueAtTime(400, t + 2);
                gain.gain.setValueAtTime(0.08, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
                osc.start(t); osc.stop(t + 2.5);
            }
        }

        // --- Coin Toss ---
        let coinTossCallback = null;
        let coinResult = null; // 'X' or 'O'

        function doCoinToss(callback) {
            coinTossCallback = callback;
            const overlay = document.getElementById('coinOverlay');
            const coinEl = document.getElementById('coin');
            const resultEl = document.getElementById('coinResult');

            // Randomly decide
            coinResult = Math.random() < 0.5 ? 'X' : 'O';
            const finalRotation = coinResult === 'X' ? '3600deg' : '3780deg'; // front or back up

            overlay.classList.add('show');
            resultEl.classList.remove('show');
            resultEl.textContent = '';

            coinEl.classList.remove('flipping');
            coinEl.style.setProperty('--final-rotation', finalRotation);

            playSound('coin');

            // Trigger flip
            requestAnimationFrame(() => {
                coinEl.classList.add('flipping');
            });

            setTimeout(() => {
                const winnerName = playerNames[coinResult] || (coinResult === 'X' ? 'Sword' : 'Shield');
                const sideName = coinResult === 'X' ? 'Sword' : 'Shield';
                resultEl.innerHTML = `${winnerName} strikes first!<br><span style="font-size:0.9rem; color:#8b7355;">${playerNames.X || 'Player'} wields Sword \u2694 &nbsp;|&nbsp; ${playerNames.O || 'Player'} bears Shield \u2764</span>`;
                resultEl.classList.add('show');

                setTimeout(() => {
                    overlay.classList.remove('show');
                    coinEl.classList.remove('flipping');
                    currentPlayer = coinResult;
                    if (coinTossCallback) coinTossCallback();
                }, 2500);
            }, 2800);

        // --- Online Multiplayer ---
        function generateCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        function getOnlineName() {

        function createRoom() {
            myName = getOnlineName();
            if (!myName || myName === 'Unknown Knight') {
                document.getElementById('onlineName').style.borderColor = '#e94560';

            peer = new Peer('royalduel-' + code);
            peer.on('open', () => {
                isOnlineHost = true;
                document.getElementById('onlineStatus').innerHTML = `
                    <div class="label">Thy Battle Code:</div>
                    <div class="code-display" onclick="navigator.clipboard.writeText('${code}')" title="Click to copy">${code}</div>
                    <div class="hint">Share this code with thy ally. Click to copy.</div>
                    <div class="hint" style="margin-top:8px; color:#f0c65a;">Awaiting challenger...</div>
                `;
            });
            peer.on('connection', (c) => {
                conn = c;
                conn.on('open', () => {
                    // Send my name to opponent
                    conn.send({ type: 'name', name: myName });

                setupConnection();

            peer.on('error', () => {

        function joinRoom() {

                conn.on('open', () => {
                    conn.send({ type: 'name', name: myName });

                });
                conn.on('error', () => {
                    statusEl.textContent = 'Could not find that battle room.';

        function setupConnection() {
            conn.on('data', (data) => {
                if (data.type === 'name') {
                    opponentName = data.name;
                    // Once both names are exchanged, host does coin toss
                    if (isOnlineHost && opponentName) {
                        startOnlineGame();
                    }
                } else if (data.type === 'coinResult') {
                    // Guest receives coin toss result
                    onlineSide = data.guestSide;
                    playerNames = data.playerNames;
                    showOnlineConnected();
                    showPlayersBar();
                    doCoinToss(() => {
                        currentPlayer = data.firstPlayer;
                        cells = Array(9).fill('');
                        gameOver = false;
                        updateOnlineStatus();
                        render();
                        updateActivePlayer();
                    });
                    // Override coinResult so animation matches
                    coinResult = data.firstPlayer;
                } else if (data.type === 'move') {
                    cells[data.index] = data.player;
                    currentPlayer = data.player;
                    playSound('place');
                    afterMove(data.index);
                } else if (data.type === 'reset') {
                    // New game coin toss from host
                    onlineSide = data.guestSide;
                    playerNames = data.playerNames;
                    showPlayersBar();
                    doCoinToss(() => {
                        currentPlayer = data.firstPlayer;
                        cells = Array(9).fill('');
                        gameOver = false;
                        updateOnlineStatus();
                        render();
                        updateActivePlayer();
                    });
                    coinResult = data.firstPlayer;
                }
            });
            conn.on('close', () => {
                statusEl.textContent = 'Thy ally has departed.';
                statusEl.style.color = '#8b4513';
                document.getElementById('playersBar').classList.remove('show');
            });
        }

            const guestSide = hostSide === 'X' ? 'O' : 'X';

            onlineSide = hostSide;
            playerNames = {
                [hostSide]: myName,
                [guestSide]: opponentName
            };

            conn.send({
                type: 'coinResult',
                firstPlayer: firstPlayer,
                guestSide: guestSide,
                playerNames: playerNames
            });

            showOnlineConnected();
            showPlayersBar();

            coinResult = firstPlayer;
            doCoinToss(() => {
                currentPlayer = firstPlayer;
                cells = Array(9).fill('');
                gameOver = false;

        // --- Render ---
        function render() {
            boardEl.innerHTML = '';
            cells.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (val) {
                    const mark = document.createElement('span');

                const disabled = gameOver || aiThinking ||
                    (mode === 'online' && currentPlayer !== onlineSide);
                if (disabled) cell.classList.add('disabled');

                cell.addEventListener('mousemove', e => {
                    const rect = cell.getBoundingClientRect();
                    cell.style.setProperty('--mx', ((e.clientX - rect.left) / rect.width * 100) + '%');
                    cell.style.setProperty('--my', ((e.clientY - rect.top) / rect.height * 100) + '%');
                });
                cell.addEventListener('mouseenter', () => { if (!val && !disabled) playSound('hover'); });
                cell.addEventListener('click', () => makeMove(i));

            updateScoreColors();
            if (mode === 'local' || mode === 'online') updateActivePlayer();

        function createRipple(cellEl, color) {
            const size = cellEl.offsetWidth * 0.5;
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.width = size + 'px'; ripple.style.height = size + 'px';
            ripple.style.left = (cellEl.offsetWidth / 2 - size / 2) + 'px';
            ripple.style.top = (cellEl.offsetHeight / 2 - size / 2) + 'px';

            cellEl.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);

        // --- Move ---
        function makeMove(i) {
            if (cells[i] || gameOver || aiThinking) return;
            if (mode === 'online' && currentPlayer !== onlineSide) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            cells[i] = currentPlayer;
            playSound('place');

            if (mode === 'online' && conn) {
                conn.send({ type: 'move', index: i, player: currentPlayer });
            }
            afterMove(i);
        }

        function afterMove(i) {
            render();
            const cellEl = boardEl.children[i];
            createRipple(cellEl, currentPlayer === 'X' ? getXColor() : getOColor());

            const winner = checkWinner();
            if (winner) {
                gameOver = true;
                playSound('win');
                let label;
                if (mode === 'ai') {
                    label = winner === humanSide ? 'Victory is thine!' : 'The Dragon prevails!';
                } else if (mode === 'online') {
                    label = winner === onlineSide ? 'Victory is thine!' : `${opponentName} conquers!`;
                } else if (mode === 'local') {
                    label = `${playerNames[winner]} triumphs!`;
                }
                statusEl.textContent = label;
                statusEl.style.color = winner === 'X' ? getXColor() : getOColor();
                scores[winner]++;
                updateScores();
                highlightWin(winner);
                spawnConfetti();
                document.querySelector('.container').classList.add('shake');
                setTimeout(() => document.querySelector('.container').classList.remove('shake'), 500);
                return;
            }
            if (cells.every(c => c)) {
                gameOver = true;
                playSound('draw');
                statusEl.textContent = 'A stalemate! Honor preserved.';
                statusEl.style.color = '#8b7355';
                scores.draws++;
                updateScores();
                document.getElementById('boardWrapper').classList.add('draw-shake');
                setTimeout(() => document.getElementById('boardWrapper').classList.remove('draw-shake'), 600);
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';

            if (mode === 'online') {
                updateOnlineStatus();
                render();
            } else if (mode === 'local') {
                statusEl.textContent = `${playerNames[currentPlayer]}'s turn`;
                statusEl.style.color = currentPlayer === 'X' ? getXColor() : getOColor();
                render();
            } else {
                updateStatus();
                if (mode === 'ai' && currentPlayer === aiSide && !gameOver) {
                    scheduleAiMove();
                }
            }
        }

        function updateStatus() {
            if (mode === 'ai') {
                if (aiThinking) {
                    statusEl.textContent = 'The Dragon ponders...';
                    statusEl.style.color = '#8b7355';
                } else {
                    statusEl.textContent = 'Draw thy sword, warrior';
                    statusEl.style.color = '#f0c65a';
                }
            } else if (mode === 'local') {
                if (localStarted) {
                    statusEl.textContent = `${playerNames[currentPlayer]}'s turn`;
                    statusEl.style.color = currentPlayer === 'X' ? getXColor() : getOColor();
                } else {
                    statusEl.textContent = 'Enter names to begin';
                    statusEl.style.color = '#8b7355';
                }
            }
        }

        // --- AI ---
        function aiMove() {
            let move;
            if (difficulty === 'easy') {
                const winMove = findWinOrBlock(aiSide);
                if (winMove !== null) { move = winMove; }
                else { move = Math.random() < 0.3 ? aiBest() : aiEasy(); }
            } else if (difficulty === 'medium') {
                const winMove = findWinOrBlock(aiSide);
                const blockMove = findWinOrBlock(humanSide);
                if (winMove !== null) { move = winMove; }
                else if (blockMove !== null) { move = blockMove; }
                else { move = Math.random() < 0.85 ? aiBest() : aiEasy(); }
            } else {
                move = aiBest();
            }
            if (move !== undefined && move !== null) makeMove(move);
        }

        function findWinOrBlock(side) {
            for (const [a, b, c] of winCombos) {
                const vals = [cells[a], cells[b], cells[c]];
                const sideCount = vals.filter(v => v === side).length;
                const emptyCount = vals.filter(v => v === '').length;
                if (sideCount === 2 && emptyCount === 1) {
                    if (cells[a] === '') return a;
                    if (cells[b] === '') return b;
                    if (cells[c] === '') return c;
                }
            }
            return null;
        }

        function aiEasy() {
            const empty = cells.map((v, i) => v === '' ? i : -1).filter(i => i >= 0);
            if (cells[4] === '') return 4;
            const corners = [0, 2, 6, 8].filter(i => cells[i] === '');
            if (corners.length > 0) return corners[Math.floor(Math.random() * corners.length)];
            return empty[Math.floor(Math.random() * empty.length)];
        }

        function aiBest() {
            let bestScore = -Infinity, bestMove;
            for (let i = 0; i < 9; i++) {
                if (cells[i] !== '') continue;
                cells[i] = aiSide;
                const score = minimax(cells, 0, false);
                cells[i] = '';
                if (score > bestScore) { bestScore = score; bestMove = i; }
            }
            return bestMove;
        }

        function minimax(board, depth, isMaximizing) {
            const winner = checkWinner();
            if (winner === aiSide) return 10 - depth;
            if (winner === humanSide) return depth - 10;
            if (board.every(c => c)) return 0;
            if (isMaximizing) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] !== '') continue;
                    board[i] = aiSide;
                    best = Math.max(best, minimax(board, depth + 1, false));
                    board[i] = '';
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] !== '') continue;
                    board[i] = humanSide;
                    best = Math.min(best, minimax(board, depth + 1, true));
                    board[i] = '';
                }
                return best;
            }
        }

        function checkWinner() {
            for (const [a, b, c] of winCombos) {
                if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) return cells[a];
            }
            return null;
        }

        function highlightWin(winner) {
            const color = winner === 'X' ? getXColor() : getOColor();
            const allCells = boardEl.querySelectorAll('.cell');
            for (const [a, b, c] of winCombos) {
                if (cells[a] === winner && cells[b] === winner && cells[c] === winner) {
                    [a, b, c].forEach(idx => {
                        allCells[idx].classList.add('win');
                        allCells[idx].style.setProperty('--glow-color', color);
                    });
                }
            }
        }

        function updateScores() {
            document.getElementById('xScore').textContent = scores.X;
            document.getElementById('oScore').textContent = scores.O;
            document.getElementById('draws').textContent = scores.draws;
        }

        function resetGame() {
            if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }
            cells = Array(9).fill('');
            currentPlayer = 'X';
            gameOver = false;
            aiThinking = false;

            if (mode === 'online') {
                if (conn && isOnlineHost) {
                    // Host does new coin toss
                    const firstPlayer = Math.random() < 0.5 ? 'X' : 'O';
                    conn.send({
                        type: 'reset',
                        firstPlayer: firstPlayer,
                        guestSide: onlineSide === 'X' ? 'O' : 'X', // opponent's side stays same
                        playerNames: playerNames
                    });
                    coinResult = firstPlayer;
                    doCoinToss(() => {
                        currentPlayer = firstPlayer;
                        cells = Array(9).fill('');
                        gameOver = false;
                        updateOnlineStatus();
                        render();
                        updateActivePlayer();
                    });
                } else if (!conn) {
                    render();
                }
                return;
            }

            if (mode === 'local') {
                if (localStarted) {
                    // Re-randomize sides each new battle
                    const names = [playerNames.X, playerNames.O];
                    if (Math.random() < 0.5) {
                        playerNames = { X: names[0], O: names[1] };
                    } else {
                        playerNames = { X: names[1], O: names[0] };
                    }
                    showPlayersBar();
                    doCoinToss(() => {
                        cells = Array(9).fill('');
                        currentPlayer = coinResult;
                        gameOver = false;
                        updateStatus();
                        render();
                    });
                } else {
                    updateStatus();
                    render();
                }
                return;
            }

            if (mode === 'ai' && firstMove === 'ai') {
                currentPlayer = aiSide;
                updateStatus(); render(); scheduleAiMove();
            } else if (mode === 'ai' && firstMove === 'human') {
                currentPlayer = humanSide;
                updateStatus(); render();
            } else {
                updateStatus(); render();
            }
        }

        function newGame() {
            if (mode === 'ai') {
                firstMove = 'human';
                document.querySelectorAll('#firstPanel .toggle-btn').forEach(b => b.classList.remove('active'));
                document.querySelector(`#firstPanel .toggle-btn[onclick="setFirstMove('human')"]`).classList.add('active');
            }
            resetGame();
        }

        function scheduleAiMove() {
            aiThinking = true;
            updateStatus(); render();
            const delay = Math.floor(Math.random() * 1000) + 2000;
            aiTimer = setTimeout(() => {
                aiTimer = null; aiThinking = false; aiMove();
            }, delay);
        }

        render();
        updateScoreColors();
    </script>
</body>
</html>
